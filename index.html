<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20 Жилийн Ойн Урилга - Үүрийн Шүүдэр</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@200;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-static: #d4af37;
            --gold-light: #fcf6ba;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Montserrat', sans-serif; background: #000; overflow: hidden; color: white; }

        /* 1. АРЫН ФОН */
        #bgMain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .dot-pattern { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(rgba(212, 175, 55, 0.07) 1px, transparent 1px); background-size: 30px 30px; opacity: 0.6; }

        /* 2. ЭХЛЭХ НҮҮР (SPLASH SCREEN) - ЗАСВАРУУД */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* Тансаг арын дэвсгэр */
            background: radial-gradient(circle at center, rgba(30,30,30,1) 0%, rgba(0,0,0,1) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 5000; text-align: center; transition: 0.8s ease;
        }

        /* Гоёмсог хүрээ бүхий агуулгын хэсэг */
        .content-wrapper {
            display: flex; flex-direction: column; align-items: center;
            animation: fadeInUp 1.5s ease-out;
            padding: 60px 40px; width: 85%; max-width: 400px; box-sizing: border-box;
            position: relative;
            
            /* Үндсэн хүрээ */
            background: rgba(10, 10, 10, 0.9);
            border: 2px solid #bf953f;
            box-shadow: 0 0 30px rgba(191, 149, 63, 0.2);
        }

        /* Гоёмсог булангийн хээ (Art-Deco стиль) */
        .content-wrapper::before, .content-wrapper::after,
        .corner-ornament-tr, .corner-ornament-bl {
            content: '';
            position: absolute;
            width: 35px; height: 35px;
            border: 2px solid var(--gold-light);
        }
        /* Зүүн дээд */
        .content-wrapper::before { top: -10px; left: -10px; border-right: none; border-bottom: none; }
        /* Баруун доод */
        .content-wrapper::after { bottom: -10px; right: -10px; border-left: none; border-top: none; }
        /* Баруун дээд */
        .corner-ornament-tr { top: -10px; right: -10px; border-left: none; border-bottom: none; }
        /* Зүүн доод */
        .corner-ornament-bl { bottom: -10px; left: -10px; border-right: none; border-top: none; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ХАМГИЙН ДЭЭР БАЙРЛАХ ТЕКСТ */
        .top-label {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            margin: 0 0 10px 0;
            color: #fff;
            opacity: 0.9;
            text-transform: uppercase;
            font-weight: 400;
        }

        .title {
            font-family: 'Cinzel', serif; font-size: 3.8rem; margin: 0; letter-spacing: 8px; font-weight: 900;
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.4));
            line-height: 1;
        }

        /* Хуучин subtitle одоо top-label болов */

        .divider { 
            width: 150px; height: 1px; 
            background: linear-gradient(to right, transparent, var(--gold-static), transparent); 
            margin: 25px 0; position: relative; 
        }
        .divider::after { content: '✦'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: var(--gold-light); font-size: 12px; }

        .date-time { font-size: 0.9rem; font-weight: 200; letter-spacing: 3px; margin-bottom: 35px; color: var(--gold-light); text-transform: uppercase;}

        .gold-button {
            padding: 16px 50px; font-size: 0.8rem; background: var(--gold); color: #000;
            border: none; cursor: pointer; box-shadow: 0 5px 25px rgba(212, 175, 55, 0.3);
            transition: 0.4s; font-weight: 800; text-transform: uppercase; letter-spacing: 3px;
            border-radius: 2px;
        }
        .gold-button:hover {
            box-shadow: 0 5px 35px rgba(212, 175, 55, 0.6);
            transform: translateY(-2px);
        }

        /* ҮНДСЭН ЮТҮБ ХЭСЭГ */
        #mainContent { display: none; width: 100%; height: 100vh; position: relative; background: #000; }
        .video-container { width: 100%; height: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #player { width: 100%; height: 100%; object-fit: contain; }

        /* 3. ТӨГСГӨЛИЙН КАРТ (MIDNIGHT GOLD MODAL) */
        #inviteCard {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95); z-index: 4000; backdrop-filter: blur(10px);
            animation: cardFadeIn 1.2s ease;
        }

        @keyframes cardFadeIn { from { opacity: 0; } to { opacity: 1; } }

        .table-modal {
            background: #0a0a0a; padding: 40px 30px; text-align: center;
            width: 80%; max-width: 340px; box-shadow: 0 0 50px rgba(212, 175, 55, 0.15);
            border: 1px solid #bf953f; position: relative;
        }
        /* Төгсгөлийн картны булангийн хээ */
        .table-modal::before, .table-modal::after { content: ''; position: absolute; width: 20px; height: 20px; border: 1px solid var(--gold-light); }
        .table-modal::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .table-modal::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        .modal-inner-border { border: 1px solid #333; padding: 35px 20px; }

        .card-title { font-family: 'Cinzel'; font-size: 0.85rem; color: var(--gold-static); letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; }
        .info-row { font-size: 0.9rem; color: #fff; margin: 18px 0; font-weight: 300; line-height: 1.7; opacity: 0.9; }
        .info-row b { color: var(--gold-light); display: block; margin-bottom: 7px; letter-spacing: 1px; font-weight: 600;}

        .replay-btn {
            background: transparent; color: var(--gold-static); padding: 12px 25px; border: 1px solid var(--gold-static);
            cursor: pointer; letter-spacing: 2px; font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; transition: 0.3s; width: 100%; margin-top: 25px;
        }
        .replay-btn:hover { background: var(--gold-static); color: #000; }

        #closeBtn { background: transparent; color: #777; border: none; cursor: pointer; font-size: 0.7rem; margin-top: 18px; text-decoration: underline; letter-spacing: 1px;}
        #closeBtn:hover { color: #fff; }

        #canvas-snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 200; pointer-events: none; opacity: 0.4; }
    </style>
</head>
<body>

    <div id="bgMain"><div class="dot-pattern"></div></div>
    <canvas id="canvas-snow"></canvas>

    <div id="splash">
        <div class="content-wrapper">
            <div class="corner-ornament-tr"></div>
            <div class="corner-ornament-bl"></div>

            <div class="top-label">СЭЛЭНГЭ-ҮҮРИЙН ШҮҮДЭР</div>
            
            <h1 class="title">20 ЖИЛ</h1>
            
            <div class="divider"></div>
            <div class="date-time">ОЙН БАЯРЫН УРИЛГА</div>
            <button class="gold-button" onclick="startInvitation()">ТҮҮХЭН ЗАМНАЛ</button>
        </div>
    </div>

    <audio id="bgMusic" src="music.mp3" loop></audio>

    <div id="mainContent">
        <div class="video-container">
            <div id="player"></div>
        </div>
    </div>

    <div id="inviteCard">
        <div class="table-modal">
            <div class="modal-inner-border">
                <div class="card-title">Эрхэм хүндэт таныг</div>
                
                <div class="info-row">
                    <b>20 Жилийн Ойн Баярт</b>
                </div>

                <div class="info-row">
                    <b>Урьж байна</b>
                    Сэлэнгэ аймаг, Сүхбаатар хот <br>
                    2026 оны 6-р сарын 21 <br> 11:00 Цагт
                </div>

                <button class="replay-btn" onclick="location.reload()">Дахин үзэх</button>
                <button id="closeBtn" onclick="closeApp()">ХААХ</button>
            </div>
        </div>
        <p style="font-size: 0.6rem; margin-top: 40px; opacity: 0.5; letter-spacing: 3px; font-family: 'Cinzel', serif;">СЭЛЭНГЭ-ҮҮРИЙН ШҮҮДЭР ЧУУЛГАН | 2006-2026</p>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        let checkTimer;
        const bgMusic = document.getElementById('bgMusic');
        const inviteCard = document.getElementById('inviteCard');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'Um9Djsv5nK4', 
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'rel': 0,
                    'modestbranding': 1,
                    'playsinline': 1,
                    'vq': 'hd720'
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function startInvitation() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                // Видео тоглуулж эхлэхээс өмнө бэлэн эсэхийг шалгах
                if (player && player.playVideo) {
                    player.playVideo();
                }
            }, 800);
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                bgMusic.pause();
                startCheckingTime();
            } else {
                stopCheckingTime();
            }
        }

        function startCheckingTime() {
            checkTimer = setInterval(() => {
                let duration = player.getDuration();
                let currentTime = player.getCurrentTime();
                // 5 секунд дутуу байхад картыг харуулна
                if (duration > 0 && (duration - currentTime <= 5)) {
                    showFinalCard();
                    clearInterval(checkTimer);
                }
            }, 500);
        }

        function stopCheckingTime() { clearInterval(checkTimer); }

        function showFinalCard() {
            inviteCard.style.display = 'flex';
            bgMusic.volume = 0.4;
            bgMusic.play();
        }

        function closeApp() {
            // "Баярлалаа" гэсэн үг гаргахгүйгээр шууд хаах
            document.body.innerHTML = ''; 
            // Хэрэв вэб хөтөч зөвшөөрвөл цонхыг бүрэн хаахыг оролдоно
            window.close(); 
        }

        // Snow Animation
        const canvas = document.getElementById('canvas-snow');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Snowflake {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = -10;
                this.size = Math.random() * 1.8 + 0.5;
                this.speed = Math.random() * 0.5 + 0.2;
                this.opacity = Math.random() * 0.5;
            }
            update() { this.y += this.speed; if (this.y > canvas.height) this.reset(); }
            draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 70; i++) particles.push(new Snowflake());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
