<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20 Жилийн Ойн Урилга - Үүрийн Шүүдэр</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --navy: #0a192f;
            --border: rgba(212, 175, 55, 0.3);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Montserrat', sans-serif; background: #000; overflow: hidden; color: white; }

        /* АРЫН ФОН */
        #bgMain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #16213e 0%, #050a14 100%); }
        #aura { position: absolute; width: 150vw; height: 150vw; top: -25%; left: -25%; background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 60%); animation: rotateAura 25s infinite linear; z-index: -1; }
        @keyframes rotateAura { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ЕРӨНХИЙ ХҮРЭЭНИЙ ЗАГВАР (Эхлэл ба Төгсгөл) */
        .card-frame {
            border: 1px solid var(--border); padding: 50px 25px; position: relative;
            max-width: 320px; background: rgba(255,255,255,0.02); text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .card-frame::before { content: '✦'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); color: var(--gold); background: var(--navy); padding: 0 15px; }

        /* ЭХЛЭЛ ХЭСЭГ (Splash) */
        #splash { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: var(--navy); z-index: 9999; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; transition: 1s ease; 
        }
        
        .anniversary-text { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2rem; letter-spacing: 4px; font-weight: 900; margin: 0; }
        .sub-title { font-size: 0.75rem; letter-spacing: 3px; opacity: 0.6; margin-top: 10px; text-transform: uppercase; }

        /* ҮНДСЭН УРИЛГА (ЮТҮБ) */
        #mainContent { display: none; width: 100%; height: 100vh; position: relative; background: #000; }
        .video-container { width: 100%; height: 100%; overflow: hidden; }
        /* Хөндлөн бичлэгийг дэлгэц дүүргэж харуулах (Cover effect) */
        #player { width: 100%; height: 100%; transform: scale(1.35); } /* Бага зэрэг томруулж ирмэгийг дүүргэнэ */

        /* УРИЛГАНЫ КАРТ (Төгсгөл) */
        #inviteCard {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.92); backdrop-filter: blur(15px);
            z-index: 2000; display: none; flex-direction: column; align-items: center; 
            justify-content: center; padding: 30px; box-sizing: border-box;
            animation: cardFade 1.5s ease;
        }
        @keyframes cardFade { from { opacity: 0; } to { opacity: 1; } }

        .title-gold { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.8rem; margin: 0; letter-spacing: 1px; }
        .info-row { margin: 25px 0; font-size: 0.95rem; line-height: 1.6; font-weight: 300; }
        .info-row b { color: var(--gold); display: block; font-family: 'Cinzel'; letter-spacing: 2px; margin-bottom: 5px; }

        .btn-gold { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 30px; font-family: 'Cinzel'; cursor: pointer; transition: 0.3s;
            margin-top: 15px; letter-spacing: 2px; font-weight: bold; font-size: 0.9rem;
        }
        .btn-gold:hover { background: var(--gold); color: #000; }

        #canvas-snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; opacity: 0.3; }
    </style>
</head>
<body>

    <div id="bgMain"><div id="aura"></div></div>
    <canvas id="canvas-snow"></canvas>

    <!-- 1. SPLASH SCREEN (Хүрээтэй болгосон) -->
    <div id="splash">
        <div class="card-frame">
            <h1 class="anniversary-text">20 ЖИЛИЙН ОЙ</h1>
            <p class="sub-title">Сэлэнгэ-Үүрийн Шүүдэр</p>
            <button class="btn-gold" style="margin-top: 35px;" onclick="startInvitation()">УРИЛГА НЭЭХ ✉️</button>
        </div>
    </div>

    <!-- Арын ая (music.mp3) -->
    <audio id="bgMusic" src="music.mp3" loop></audio>

    <!-- 2. ЮТҮБ ВИДЕО ХЭСЭГ -->
    <div id="mainContent">
        <div class="video-container">
            <div id="player"></div>
        </div>
    </div>

    <!-- 3. ЭЦСИЙН УРИЛГАНЫ КАРТ -->
    <div id="inviteCard">
        <div class="card-frame">
            <h1 class="title-gold">БАЯРЫН УРИЛГА</h1>
            <p style="font-size: 0.75rem; letter-spacing: 2px; margin-top: 5px; opacity: 0.7;">2005 - 2025</p>
            
            <div class="info-row">
                <b>БАЯРЫН ЦӨГЦӨЛӨӨ:</b>
                2025 оны 10-р сарын 25 <br> 11:00 Цагт
            </div>
            
            <div class="info-row">
                <b>БАЙРШИЛ:</b>
                Сэлэнгэ аймаг, Сүхбаатар хот, <br> Чуулганы баярын танхимд
            </div>

            <button class="btn-gold" style="font-size: 0.7rem;" onclick="location.reload()">ДАХИН ҮЗЭХ</button>
        </div>
        <p style="font-size: 0.55rem; margin-top: 30px; opacity: 0.4; letter-spacing: 2px;">ҮҮРИЙН ШҮҮДЭР ЧУУЛГАН</p>
    </div>

    <!-- YouTube API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        let checkTimer;
        const bgMusic = document.getElementById('bgMusic');
        const inviteCard = document.getElementById('inviteCard');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'Um9Djsv5nK4', 
                playerVars: {
                    'autoplay': 0,
                    'controls': 0, // Илүү цэвэрхэн харагдуулахын тулд удирдлагыг нуув
                    'rel': 0,
                    'modestbranding': 1,
                    'playsinline': 1,
                    'vq': 'hd720' // HD чанарыг санал болгоно
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function startInvitation() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                player.playVideo();
            }, 800);
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                bgMusic.pause();
                // Бичлэг дуусахаас 5 секундын өмнө шалгах таймерыг эхлүүлнэ
                startCheckingTime();
            } else {
                stopCheckingTime();
            }
        }

        function startCheckingTime() {
            checkTimer = setInterval(() => {
                let duration = player.getDuration();
                let currentTime = player.getCurrentTime();
                
                // Дуусахаас 5 секунд дутуу байвал карт харуулна
                if (duration > 0 && (duration - currentTime <= 5)) {
                    showFinalCard();
                    clearInterval(checkTimer);
                }
            }, 500);
        }

        function stopCheckingTime() {
            clearInterval(checkTimer);
        }

        function showFinalCard() {
            inviteCard.style.display = 'flex';
            bgMusic.volume = 0.4;
            bgMusic.play();
        }

        // Snow animation
        const canvas = document.getElementById('canvas-snow');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Snowflake {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = -10;
                this.size = Math.random() * 1.5 + 0.5;
                this.speed = Math.random() * 0.4 + 0.2;
                this.opacity = Math.random() * 0.4;
            }
            update() { this.y += this.speed; if (this.y > canvas.height) this.reset(); }
            draw() { ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 50; i++) particles.push(new Snowflake());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
