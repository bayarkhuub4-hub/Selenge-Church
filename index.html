<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>20 Жилийн Ойн Урилга - Үүрийн Шүүдэр</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@200;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --gold-static: #d4af37;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Montserrat', sans-serif; background: #000; overflow: hidden; color: white; }

        /* 1. АРЫН ФОН */
        #bgMain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .dot-pattern { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 25px 25px; opacity: 0.5; }

        /* 2. ЭХЛЭХ НҮҮР (SPLASH) */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 5000; text-align: center; transition: 0.8s ease;
        }

        .content-wrapper {
            display: flex; flex-direction: column; align-items: center;
            animation: fadeInUp 1.5s ease-out;
            padding: 40px; 
            box-sizing: border-box;
            position: relative;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .content-wrapper::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, rgba(252, 246, 186, 0.1), transparent 30%);
            animation: rotateGlow 6s linear infinite; z-index: -1;
        }

        @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .title {
            font-family: 'Cinzel', serif; font-size: 3.2rem; margin: 0; letter-spacing: 6px; font-weight: 700;
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        .subtitle { font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 4px; margin: 15px 0; color: #fff; opacity: 0.8; text-transform: uppercase; }

        .divider { width: 120px; height: 1px; background: var(--gold); margin: 20px 0; position: relative; }
        .divider::after { content: '✦'; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: #fcf6ba; font-size: 10px; }

        .date-time { font-size: 1rem; font-weight: 200; letter-spacing: 2px; margin-bottom: 25px; color: #fcf6ba; }

        .gold-button {
            padding: 16px 45px; font-size: 0.85rem; background: var(--gold); color: #000;
            border: none; cursor: pointer; box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            transition: 0.4s; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
        }

        /* 3. ВИДЕО ХЭСЭГ (Зөөлөн шаргал, хөдөлгөөнт туяат фон) */
        #mainContent { 
            display: none; width: 100%; height: 100vh; position: relative;
            background: linear-gradient(135deg, #110a02, #2a1b05, #0a0601, #301f05);
            background-size: 400% 400%;
            animation: goldBgFlow 15s ease infinite;
            overflow: hidden;
        }
        
        /* Бүдэг гэрлүүд (Дээд болон доод хэсэгт хөдөлнө) */
        #mainContent::before, #mainContent::after {
            content: ''; position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.35; pointer-events: none;
        }
        #mainContent::before {
            width: 350px; height: 350px; background: #d4af37; top: -50px; left: -100px;
            animation: floatLight1 12s infinite alternate ease-in-out;
        }
        #mainContent::after {
            width: 450px; height: 450px; background: #bf953f; bottom: -100px; right: -50px;
            animation: floatLight2 15s infinite alternate ease-in-out;
        }

        @keyframes goldBgFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes floatLight1 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 80px) scale(1.1); } }
        @keyframes floatLight2 { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(-80px, -60px) scale(1.2); } }

        .video-container { 
            width: 100%; height: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; 
            position: relative; z-index: 2;
            transform: translateY(-8%);
        }
        #player { width: 100%; height: 100%; object-fit: contain; }

        /* 4. ТӨГСГӨЛИЙН КАРТ */
        #inviteCard {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.92); z-index: 4000; backdrop-filter: blur(10px);
            animation: cardFadeIn 1.2s ease;
        }

        @keyframes cardFadeIn { from { opacity: 0; } to { opacity: 1; } }

        .table-modal {
            background: #0a0a0a; padding: 30px 25px 20px 25px; text-align: center;
            width: 80%; max-width: 320px; box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
            border: 1px solid #bf953f; position: relative;
        }

        .modal-inner-border { border: 1px solid #444; padding: 25px 15px 15px 15px; position: relative; }

        .card-title { font-family: 'Cinzel'; font-size: 0.8rem; color: #d4af37; letter-spacing: 3px; margin-bottom: 15px; text-transform: uppercase; }
        .info-row { font-size: 0.9rem; color: #fff; margin: 15px 0; font-weight: 300; line-height: 1.6; opacity: 0.9; }
        .info-row b { color: #d4af37; display: block; margin-bottom: 5px; letter-spacing: 1px; }

        /* Байршил, хугацааны хэсгийг тусгаарлаж зай авах */
        .location-box { margin-top: 30px; }

        .action-buttons { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 20px; }

        .replay-btn {
            background: transparent; color: #d4af37; padding: 10px 35px; border: 1px solid #d4af37;
            cursor: pointer; letter-spacing: 1px; font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; transition: 0.3s; width: auto; 
        }
        .replay-btn:hover { background: #d4af37; color: #000; }

        #closeBtn { background: transparent; color: #888; border: none; cursor: pointer; font-size: 0.7rem; text-decoration: underline; }
        #closeBtn:hover { color: #fff; }

        .donate-section {
            margin-top: 25px; padding-top: 15px; border-top: 1px solid rgba(212, 175, 55, 0.2); width: 100%;
        }

        .donate-btn {
            background: transparent; color: #fcf6ba; padding: 8px 25px; border: 1px solid rgba(252, 246, 186, 0.4);
            cursor: pointer; letter-spacing: 1px; font-size: 0.7rem; font-weight: 400; text-transform: uppercase; transition: 0.3s; display: inline-block; opacity: 0.8;
        }
        .donate-btn:hover { opacity: 1; background: rgba(252, 246, 186, 0.1); }

        /* ХАНДИВЫН МЭДЭЭЛЭЛ (MODAL ДОТОРХ MODAL) */
        #donateInfo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a; display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; box-sizing: border-box;
        }
        
        .donate-inner-border {
            border: 1px solid #444; width: calc(100% - 40px); height: calc(100% - 40px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }

        .bank-info { font-size: 0.85rem; text-align: left; line-height: 1.8; color: #fff; margin-bottom: 20px; }
        .bank-info b { color: #fcf6ba; }

        #canvas-snow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 200; pointer-events: none; opacity: 0.3; }
    </style>
</head>
<body>

    <div id="bgMain"><div class="dot-pattern"></div></div>
    <canvas id="canvas-snow"></canvas>

    <!-- 1. SPLASH SCREEN -->
    <div id="splash">
        <div class="content-wrapper">
            <h1 class="title">20 ЖИЛ</h1>
            <div class="subtitle">СЭЛЭНГЭ-ҮҮРИЙН ШҮҮДЭР</div>
            <div class="divider"></div>
            <div class="date-time">ОЙН БАЯРЫН УРИЛГА</div>
            <button class="gold-button" onclick="startInvitation()">ТҮҮХЭН ЗАМНАЛ</button>
        </div>
    </div>

    <!-- Арын ая -->
    <audio id="bgMusic" src="music.mp3" loop></audio>

    <!-- 2. ВИДЕО ХЭСЭГ (Хөдөлгөөнт туяатай арын дэвсгэр) -->
    <div id="mainContent">
        <div class="video-container">
            <div id="player"></div>
        </div>
    </div>

    <!-- 3. ТӨГСГӨЛИЙН КАРТ -->
    <div id="inviteCard">
        <div class="table-modal">
            
            <div class="modal-inner-border">
                <div class="card-title">Эрхэм хүндэт таныг</div>
                
                <div class="info-row">
                    <b>20 Жилийн Ойн Баярт</b>
                </div>

                <div class="info-row">
                    <b>Урьж байна</b>
                </div>

                <!-- Зай авсан байршлын хэсэг -->
                <div class="info-row location-box">
                    Сэлэнгэ аймаг, Сүхбаатар хот <br>
                    2026 оны 6-р сарын 21 <br> 11:00 Цагт
                </div>

                <div class="action-buttons">
                    <button class="replay-btn" onclick="location.reload()">Дахин үзэх</button>
                    <button id="closeBtn" onclick="closeApp()">ХААХ</button>
                </div>

                <!-- Хандив өргөх товчлуур -->
                <div class="donate-section">
                    <button class="donate-btn" onclick="showDonate()">Хандив өргөх</button>
                </div>
            </div>

            <!-- ХАНДИВЫН МЭДЭЭЛЛИЙН ХЭСЭГ (Дарсны дараа гарч ирнэ) -->
            <div id="donateInfo">
                <div class="donate-inner-border">
                    <div class="card-title">Хандивын данс</div>
                    <div class="bank-info">
                        Банк: <b>ХААН БАНК</b><br>
                        Данс: <b>5000000000</b><br> <!-- Өөрийн дансаа бичнэ -->
                        Хүлээн авагч: <b>Б. Бат</b><br> <!-- Хүлээн авагчийн нэр -->
                        Гүйлгээний утга: <b>Ойн хандив</b>
                    </div>
                    <button class="replay-btn" style="width: 100%; margin-top: 10px;" onclick="hideDonate()">Буцах</button>
                </div>
            </div>

        </div>
        <p style="font-size: 0.55rem; margin-top: 30px; opacity: 0.4; letter-spacing: 2px;">СЭЛЭНГЭ-ҮҮРИЙН ШҮҮДЭР ЧУУЛГАН | 2006-2026</p>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        let checkTimer;
        const bgMusic = document.getElementById('bgMusic');
        const inviteCard = document.getElementById('inviteCard');
        const donateInfo = document.getElementById('donateInfo');

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'Um9Djsv5nK4', 
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'rel': 0,
                    'modestbranding': 1,
                    'playsinline': 1,
                    'vq': 'hd720'
                },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function startInvitation() {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                if(player && player.playVideo) {
                    player.playVideo();
                }
            }, 800);
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                bgMusic.pause();
                startCheckingTime();
            } else {
                stopCheckingTime();
            }
        }

        function startCheckingTime() {
            checkTimer = setInterval(() => {
                let duration = player.getDuration();
                let currentTime = player.getCurrentTime();
                if (duration > 0 && (duration - currentTime <= 5)) {
                    showFinalCard();
                    clearInterval(checkTimer);
                }
            }, 500);
        }

        function stopCheckingTime() { clearInterval(checkTimer); }

        function showFinalCard() {
            inviteCard.style.display = 'flex';
            bgMusic.volume = 0.4;
            bgMusic.play();
        }

        function closeApp() {
            document.body.innerHTML = `<div style="background:#000; height:100vh; display:flex; justify-content:center; align-items:center; font-family:'Cinzel'; color:#d4af37;">БАЯРЛАЛАА</div>`;
        }

        // Хандивын мэдээлэл харуулах, нуух функц
        function showDonate() {
            donateInfo.style.display = 'flex';
        }
        function hideDonate() {
            donateInfo.style.display = 'none';
        }

        // Snow Animation
        const canvas = document.getElementById('canvas-snow');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Snowflake {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width; this.y = -10;
                this.size = Math.random() * 1.5 + 0.5;
                this.speed = Math.random() * 0.4 + 0.2;
                this.opacity = Math.random() * 0.4;
            }
            update() { this.y += this.speed; if (this.y > canvas.height) this.reset(); }
            draw() { ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 60; i++) particles.push(new Snowflake());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
